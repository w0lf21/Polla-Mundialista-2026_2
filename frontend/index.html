<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundial 2026</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-screen" class="screen active">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img
  src="logo-mundial-2026.jpg"
  alt="FIFA World Cup 2026"
  style="width:150px;height:auto;display:block;margin:0 auto 0.75rem"
>
      <div id="fallback-trophy" style="font-size:2.5rem;display:none">🏆</div>
      <div style="font-size:1.6rem;font-weight:700;color:#185FA5">Polla Mundial 2026</div>
      <div style="font-size:13px;color:var(--color-text-muted);margin-top:4px">
        
      </div>
    </div>
    <div class="tabs-toggle">
      <button class="tab-toggle active" data-tab="login">Ingresar</button>
      <button class="tab-toggle" data-tab="register">Registrarme</button>
    </div>
    <form id="login-form" class="auth-form active">
      <label>Usuario</label>
      <input type="text" id="login-username" required autocomplete="username">
      <label>Contraseña</label>
      <input type="password" id="login-password" required autocomplete="current-password">
      <button type="submit" class="btn-primary">Entrar</button>
      <div class="error-msg" id="login-error"></div>
    </form>
    <form id="register-form" class="auth-form">
      <label>Usuario (sin espacios)</label>
      <input type="text" id="reg-username" pattern="[a-zA-Z0-9_]+" required autocomplete="username">
      <label>Tu nombre completo</label>
      <input type="text" id="reg-display" required autocomplete="name">
      <label>Contraseña (mínimo 4 caracteres)</label>
      <input type="password" id="reg-password" minlength="4" required autocomplete="new-password">
      <button type="submit" class="btn-primary">Crear cuenta</button>
      <div class="error-msg" id="register-error"></div>
    </form>
    <div style="text-align:right;margin-top:16px;font-style:italic;font-size:12px;color:var(--color-text-muted);opacity:0.5;letter-spacing:0.5px">
      by CRUDOBET
    </div>
  </div>
</div>

<div id="app-screen" class="screen">
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="logo_fifa.png" alt="FIFA World Cup 2026" style="height:28px;width:auto;object-fit:contain">
        <span>FIFA World Cup 2026™</span>
      </div>
      <div class="header-user">
        <span class="user-name" id="header-username"></span>
        <span class="points-badge" id="header-points">0 pts</span>
        <button class="btn-ghost" onclick="app.logout()">Salir</button>
      </div>
    </div>
    <nav class="app-nav" id="app-nav"></nav>
  </header>
  <main id="main-content"></main>
</div>

<script src="app.js"></script>
</body>
</html>
