services:
  - type: web
    name: polla-mundial
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run init-db
    startCommand: cd backend && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20
    disk:
      name: polla-db
      mountPath: /opt/render/project/src/backend/db
      sizeGB: 1
